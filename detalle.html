<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Paquete - Turismo Leones</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦁</text></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #0a1a6b;
            --blue: #1432c8;
            --purple: #6a0dad;
            --violet: #7c3aed;
            --gold: #f5a623;
            --orange: #f97316;
            --white: #ffffff;
            --light-gray: #f0f4ff;
            --dark: #0d1117;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fff;
            color: var(--dark);
            overflow-x: hidden;
        }

        .pkg-view {
            width: 100%;
            height: 100vh;
            background: #fff;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .pkg-header {
            background: linear-gradient(135deg, #0a1a6b 0%, #1432c8 100%);
            padding: 15px 40px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
        }

        .pkg-back {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .pkg-back:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .pkg-content {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 40px;
        }

        .pkg-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .pkg-media-box {
            background: #fff;
            border-radius: 0;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-height: 75vh;
            display: flex;
            justify-content: center;
        }

        .pkg-media-box img,
        .pkg-media-box video {
            max-height: 100%;
            max-width: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .pkg-info-box {
            display: flex;
            flex-direction: column;
        }

        .pkg-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            color: var(--navy);
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .pkg-season-pill {
            display: inline-block;
            background: var(--blue);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        .pkg-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 20px;
        }

        .pkg-reservar-btn {
            background: #16a34a;
            color: white;
            padding: 15px 40px;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.4);
            transition: transform 0.2s;
        }

        .pkg-reservar-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 163, 74, 0.6);
        }

        .pkg-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: opacity 0.3s ease;
            z-index: 5;
            opacity: 0;
        }

        .pkg-media-box:hover .pkg-play-overlay {
            opacity: 1;
        }

        .play-icon-circle {
            width: 80px;
            height: 80px;
            background: var(--navy);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 3px solid white;
            transition: transform 0.2s;
        }

        .pkg-play-overlay:hover .play-icon-circle {
            transform: scale(1.1);
        }

        .play-hint {
            position: absolute;
            bottom: 20px;
            background: rgba(10, 26, 107, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .pkg-features {
            list-style: none;
            margin-bottom: 30px;
        }

        .pkg-features li {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 15px;
            font-weight: 600;
            color: #444;
        }

        .pkg-features li span {
            font-size: 20px;
        }

        .pkg-price-bar {
            background: var(--gold);
            color: white;
            font-size: 32px;
            font-family: 'Bebas Neue', sans-serif;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            letter-spacing: 2px;
        }

        .pkg-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .pkg-tab-btn {
            flex: 1;
            background: #e2e8f0;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            color: #555;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 150px;
        }

        .pkg-tab-btn.active {
            background: var(--blue);
            color: white;
        }

        .pkg-tab-content {
            display: none;
            background: #f8FAFC;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            line-height: 1.7;
            color: #444;
        }

        .pkg-tab-content.active {
            display: block;
        }

        .pkg-tab-content p,
        .pkg-tab-content ul {
            margin-bottom: 15px;
        }

        .pkg-tab-content ul {
            padding-left: 20px;
        }

        .pkg-payment {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 40px;
        }

        .pkg-payment h3 {
            margin-bottom: 20px;
            color: var(--navy);
        }

        .pkg-payment-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            font-size: 40px;
            color: var(--blue);
        }

        .pkg-payment-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--navy);
        }

        .pkg-payment-item svg {
            width: 50px;
            height: 50px;
            fill: var(--blue);
        }

        @media (max-width: 800px) {
            .pkg-hero {
                grid-template-columns: 1fr;
            }

            .pkg-controls {
                flex-direction: column;
                gap: 20px;
                align-items: stretch;
            }

            .pkg-reservar-btn {
                width: 100%;
                text-align: center;
            }

            .pkg-tab-btn {
                flex: 1 1 100%;
            }
        }

        @media (max-width: 600px) {
            .pkg-header {
                padding: 10px 20px;
                font-size: 20px;
            }

            .pkg-content {
                padding: 20px 15px;
            }

            .pkg-title {
                font-size: 32px;
            }

            .pkg-price-bar {
                font-size: 26px;
            }

            .pkg-tab-btn {
                padding: 12px;
                font-size: 13px;
            }

            .pkg-tab-content {
                padding: 20px;
                font-size: 14px;
            }
        }
    </style>
    <script src="data/paquetes.js"></script>
</head>

<body>

    <div class="pkg-view">
        <div class="pkg-header">
            <a href="index.html" class="pkg-back">← Volver al inicio</a>
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size: 24px;">🦁</span>
                Turismo Leones
            </div>
        </div>
        <div class="pkg-content">
            <div class="pkg-hero">
                <div class="pkg-media-box" id="pkgMediaBox">
                    <img id="pkgImage" src="" alt="Paquete turístico">
                </div>
                <div class="pkg-info-box">
                    <div class="pkg-season-pill" id="pkgSeason"></div>
                    <h1 class="pkg-title" id="pkgTitle">Cargando...</h1>

                    <div class="pkg-controls">
                        <div style="font-weight:600; color:#666;">Seleccionar fecha: <br><select
                                style="margin-top:5px; padding:8px; border-radius:4px; border:1px solid #ccc; width:100%">
                                <option>Elige una opción</option>
                                <option>Verano 2026</option>
                                <option>Otoño 2026</option>
                            </select></div>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <a href="https://wa.me/5491139470000?text=Hola,%20quisiera%20averiguar%20por%20un%20paquete"
                                class="pkg-reservar-btn" id="pkgReservarBtn" target="_blank">RESERVAR</a>
                        </div>
                    </div>

                    <ul class="pkg-features" id="pkgFeatures">
                    </ul>

                    <div class="pkg-price-bar" id="pkgPrice">$ 0.00</div>
                </div>
            </div>

            <div class="pkg-tabs">
                <button class="pkg-tab-btn active" onclick="switchTab('itinerario')">Itinerario</button>
                <button class="pkg-tab-btn" onclick="switchTab('notas')">Notas Importantes</button>
                <button class="pkg-tab-btn" onclick="switchTab('embarque')">Puntos de Embarque</button>
            </div>

            <div id="tab-itinerario" class="pkg-tab-content active"></div>
            <div id="tab-notas" class="pkg-tab-content"></div>
            <div id="tab-embarque" class="pkg-tab-content"></div>

            <div class="pkg-payment">
                <h3>Medios de Pago</h3>
                <div style="margin-bottom: 20px; font-size: 14px; line-height: 1.6;">
                    <strong>Condiciones:</strong> 20% de seña para reservar y el saldo restante 7 días antes de viajar.
                    <br>
                    <strong>Financiación:</strong> Disponemos de 3 y 6 cuotas.
                </div>
                <div class="pkg-payment-logos">
                    <div class="pkg-payment-item"><svg viewBox="0 0 24 24">
                            <path
                                d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" />
                        </svg> EFECTIVO</div>
                    <div class="pkg-payment-item"><svg viewBox="0 0 24 24">
                            <path
                                d="M11 2C6.03 2 2 6.03 2 11h9V2zm2 0v9h9C22 6.03 17.97 2 13 2zm9 11h-9v9c4.97 0 9-4.03 9-9zM2 13v.03C2 17.97 6.03 22 11 22v-9H2z" />
                        </svg> CUOTAS</div>
                    <div class="pkg-payment-item"><svg viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                        </svg> MERCADO PAGO</div>
                    <div class="pkg-payment-item"><svg viewBox="0 0 24 24">
                            <path
                                d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z" />
                        </svg> BANCO</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.pkg-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.pkg-tab-content').forEach(c => c.classList.remove('active'));
            const btn = document.querySelector(`.pkg-tab-btn[onclick="switchTab('${tabId}')"]`);
            if (btn) btn.classList.add('active');
            const target = document.getElementById(`tab-${tabId}`);
            if (target) target.classList.add('active');
        }

        function reproducirVideo() {
            const videoUrl = new URLSearchParams(window.location.search).get('video');
            if (videoUrl) {
                const mediaBox = document.getElementById('pkgMediaBox');
                mediaBox.innerHTML = `<video id="detailVideo" src="${videoUrl}" controls autoplay style="max-height: 100%; max-width: 100%; width: 100%;"></video>`;
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const season = params.get('season');
            const urlImage = params.get('image');
            const urlVideo = params.get('video');

            if (!id) {
                document.getElementById('pkgTitle').textContent = "Paquete no encontrado";
                return;
            }

            const data = getPackageData(id, season);

            document.title = `${data.title} - Turismo Leones`;
            document.getElementById('pkgTitle').textContent = data.title;
            document.getElementById('pkgSeason').textContent = (data.season === 'enviar info' || !data.season) ? 'Consultar' : data.season;
            document.getElementById('pkgPrice').textContent = (data.price && data.price !== 'Consultar') ? `$ ${data.price}` : 'Consultar Precio';

            const mediaBox = document.getElementById('pkgMediaBox');
            if (urlImage) {
                let html = `<img src="${urlImage}" alt="${data.title}" style="cursor: pointer; width: 100%; height: 100%; object-fit: contain;">`;

                if (urlVideo) {
                    html += `
                        <div class="pkg-play-overlay" onclick="reproducirVideo()">
                            <div class="play-icon-circle">▶</div>
                            <div class="play-hint">TOCA EL FLYER PARA VER VIDEO</div>
                        </div>
                    `;
                }
                mediaBox.innerHTML = html;
            } else if (urlVideo) {
                mediaBox.innerHTML = `<video id="detailVideo" src="${urlVideo}" controls autoplay muted loop style="max-height: 100%; max-width: 100%; width: 100%;"></video>`;
                document.getElementById('pkgPlayBtn').style.display = 'flex';
            } else if (data.image) {
                mediaBox.innerHTML = `<img src="${data.image}" alt="${data.title}">`;
                document.getElementById('pkgPlayBtn').style.display = 'none';
            }

            const wpText = `Hola, quisiera averiguar por el paquete de ${data.title}${data.season ? ' (' + data.season + ')' : ''}`;
            document.getElementById('pkgReservarBtn').href = `https://wa.me/5491151233885?text=${encodeURIComponent(wpText)}`;

            const featuresList = document.getElementById('pkgFeatures');
            if (data.features && data.features.length) {
                featuresList.innerHTML = data.features.map(f => `<li><span>${f.icon}</span> ${f.text}</li>`).join('');
            }

            document.getElementById('tab-itinerario').innerHTML = data.itinerary || '<p>Itinerario a confirmar.</p>';
            document.getElementById('tab-notas').innerHTML = data.importantNotes || '<p>Consultar notas importantes con la agencia.</p>';
            document.getElementById('tab-embarque').innerHTML = data.boardingPoints || '<p>Puntos de embarque a confirmar.</p>';
            document.getElementById('tab-legales').innerHTML = data.legal || '<p>Términos y condiciones aplican.</p>';
        };
    </script>
</body>

</html>
